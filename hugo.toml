  [params.homeInfoParams]
  enabled = true
  Title = ""
  Content = """
<div style="display:flex; align-items:center; gap:1.5rem; margin-bottom:1.5rem;">
  <img src="/images/tobeif.png" alt="Tobias Eifler" style="width:130px; height:130px; border-radius:50%; object-fit:cover; flex-shrink:0;">
  <div>
    <strong style="font-size:1.3rem;">Tobias Eifler</strong><br>
    <a href="https://orbit.dtu.dk/en/persons/tobias-eifler/" target="_blank">Associate Professor in Engineering Design and Manufacturing Systems<br>
    <em>Civil & Mechanical Engineering (DTU Construct), Technical University of Denmark</em></a>
  </div>
</div>

👋 Welcome to a bit of a high-level summary of what we do in our small research group at DTU. I am Associate Professor in the section for *Engineering Design and Manufacturing Systems* at *DTU Construct*, with an interest in Engineering Design, Product Realisation,  and all forms of Uncertainty and Variation during development and in production. Or, borrowing from a modern classic:   

<blockquote style="text-align:center; border-left:none; font-style:italic;">
  "... he sees steel in various shapes (...), I look at the shapes of the steel now and I see ideas"
  <footer style="font-size:0.6em; font-style:normal; margin-top:0.3em;text-align:right;"> Robert M. Pirsig: <cite>Zen and the Art of Motorcycle Maintenance - An Inquiry into Values</cite></footer>
</blockquote>

My interest are all aspects related to these ideas in the realisation of complex systems. May that be human ideation and cognitive biases, (neuro-symbolic) AI-support, Robust Design, Trade-Space exploration, or, the more philosophical question, of what constitutes an ideal design.

<div style="margin-bottom:1rem;"></div>

Anyways, if you find something interesting on the following pages, if you have ideas, feedback, criticism, or if you just want to get in contact, please just drop us an email at tobeif@dtu.dk! A full overview of all earlier blog posts can be found here <a href="/Posts/">Archive of Blog Posts</a>.


"""

